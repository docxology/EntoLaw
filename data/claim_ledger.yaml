  - id: north-american-insect-protection-gap-2026
    claim: "A 2026 PNAS study reports that the conservation status of 88.5 percent of described North American insect and arachnid species is unknown, and that 94.7 percent of at-risk U.S. insects and arachnids are not protected by any state or federal law."
