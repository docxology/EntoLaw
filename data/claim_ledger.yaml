# claim_ledger.yaml — registers externally-sourced prose statistics that do
# NOT come from src.manuscript_variables (they are not registry-derived counts
# but external facts). Each entry pins the claim, a references.bib source key,
# the manuscript anchor, AND a verification record capturing the real external
# evidence: the source URL, a verbatim supporting quote, the as-of date, a
# confidence label, and the date the check was last run.
#
# WHY a verification block. The bibkey + anchor checks (src/claim_ledger.py)
# prove a claim is *attributed and anchored*; they cannot prove the *number is
# true*. The verification block makes each prose statistic auditable: a reader
# (or the @pytest.mark.live oracle in tests/test_live_claim_sources.py) can
# fetch source_url and confirm the quote appears. status vocabulary:
#   verified              — external source fetched; quote supports the claim
#   verified_with_nuance  — numbers are real but the claim was rephrased
#   documented            — grounded in the project's own registry module
#
claims:
  - id: esa-invertebrate-definition
    claim: "The Endangered Species Act defines 'fish or wildlife' to include any 'arthropod or other invertebrate'"
    source: "usc16_1532"
    anchor: "sec:protected"
    verification:
      status: verified
      verified_value: "16 U.S.C. § 1532(8) defines 'fish or wildlife' to mean any member of the animal kingdom including, without limitation, any mammal, fish, bird, amphibian, reptile, mollusk, crustacean, arthropod or other invertebrate."
      source_url: "https://www.law.cornell.edu/uscode/text/16/1532"
      source_quote: "arthropod or other invertebrate"
      as_of: "2026"
      confidence: high
      checked: "2026-06-27"
  - id: flying-insect-biomass-decline
